name: Playwright Link Checks

on:
  workflow_dispatch: # handmatig starten via GitHub Actions tab

jobs:
  discover-showcases:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover showcase folders
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          showcases=$(find . -mindepth 1 -maxdepth 1 -type d ! -name '.*' | while read -r dir; do
            name="${dir#./}"

            if [[ -f "$dir/package.json" && -f "$dir/playwright.config.ts" && -d "$dir/tests" ]]; then
              printf '%s\n' "$name"
            fi
          done | sort)

          if [[ -z "$showcases" ]]; then
            echo 'No showcase folders with package.json, playwright.config.ts and tests/ found.' >&2
            exit 1
          fi

          matrix=$(printf '%s\n' "$showcases" | jq -R . | jq -cs .)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (all workspaces)
        run: npm ci --workspaces

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run all tests
        run: CI=true npm test

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: '*/playwright-report/'
          if-no-files-found: ignore
